    <title>Codernic Mission Control</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #131316;
        color: #fff;
        height: 100vh;
        overflow: hidden;
      }
      .loader-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        opacity: 0.055;
        pointer-events: none;
        user-select: none;
        animation: loaderPulse 4s infinite ease-in-out;
      }
      @keyframes loaderPulse {
        0%, 100% { opacity: 0.055; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.05); }
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(245, 158, 11, 0.2);
        border-top: 2px solid #fbbf24;
        border-radius: 50%;
        animation: rotate 1s linear infinite;
        margin-top: 8px;
      }
      @keyframes rotate {
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
